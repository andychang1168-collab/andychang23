<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Specified Button Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Roboto, Arial, sans-serif;
      background: #f6f6f6;
      color: #2f2f2f;
      font-size: 13px;
    }
    .page {
      width: 760px;
      margin: 32px auto;
      background: #fff;
      border: 1px solid #eaeaea;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .header {
      height: 32px;
      background: #f6f6f6;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid #eaeaea;
      color: #707070;
    }
    .viewer {
      padding: 20px 26px 10px 20px;
    }
    .image-frame {
      width: 496px;
      margin: 0 auto;
      border: 1px solid #eaeaea;
      background: #fff4df;
      padding: 0 24px;
      position: relative;
    }
    .image-frame img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .action-row {
      display: flex;
      justify-content: flex-end;
      margin: 12px 0 10px;
    }
    .info-button {
      height: 22px;
      min-width: 74px;
      border-radius: 8px;
      border: 1px solid #2f2f2f;
      background: #ffffff;
      color: #2f2f2f;
      font: 400 13px Roboto, Arial, sans-serif;
      line-height: 20px;
      padding: 0 18px;
      cursor: pointer;
    }
    .info-button:hover { background: #f3f3f3; }
    .info-button:active { transform: translateY(1px); }
    .detail-panel {
      display: none;
      min-height: 70px;
      margin: 0 auto 20px;
      width: 496px;
      border-top: 1px solid #eaeaea;
      background: #f9fff9;
      padding: 10px;
      color: #707070;
    }
    .detail-panel.show { display: block; }
    .detail-line {
      background: #73ff7a;
      margin-bottom: 6px;
      padding: 3px 8px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="header">預覽</div>

    <section class="viewer" aria-label="Image preview module">
      <div class="action-row">
        <button class="info-button" id="showInfoBtn" type="button">查看資訊</button>
      </div>

      <div class="image-frame">$1</div>

      <div class="detail-panel" id="detailPanel" aria-live="polite">
        <div class="detail-line">拍攝日期：2017/10/12</div>
        <div class="detail-line">大小：496.97KB</div>
        <div class="detail-line">路徑：DesignCenter / PDM / sample</div>
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById('showInfoBtn');
    const panel = document.getElementById('detailPanel');

    button.addEventListener('click', () => {
      panel.classList.toggle('show');
      button.textContent = panel.classList.contains('show') ? '收起資訊' : '查看資訊';
    });
  </script>
</body>
</html>
